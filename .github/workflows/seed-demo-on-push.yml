# Production Supabase-ə demo məlumat yazır (10 satıcı, 30 məhsul).
# Repo → Settings → Secrets and variables → Actions:
#   NEXT_PUBLIC_SUPABASE_URL
#   SUPABASE_SERVICE_ROLE_KEY
#
# `main` branch-ə hər push-da işləyir (əvvəlki zivia-demo-* təmizlənib yenilənir).

name: Seed demo catalog

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: seed-demo-catalog
  cancel-in-progress: false

jobs:
  seed:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run seed (10 sellers, 30 products)
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npm run seed:demo
